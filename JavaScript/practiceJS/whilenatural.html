<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.writeln("Natural Numbers Are:");
        let i = 1;
        while(i<=5){
            document.writeln(i);
            document.writeln("<br>");
            i++;
        }
    </script>
</body>
</html>
