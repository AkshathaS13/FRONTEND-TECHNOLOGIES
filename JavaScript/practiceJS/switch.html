<body>
    <script>
        let grade = prompt("Enter your grade (A, B, C, D):");
        switch(grade) {
            case 'A':
                document.writeln("Excellent");
                break;
            case 'B':grade
                document.writeln("Good");
                break;
            case 'C':
                document.writeln("Average");
                break;
            case 'D':
                document.writeln("Poor");
                break;        
        }
    </script>
