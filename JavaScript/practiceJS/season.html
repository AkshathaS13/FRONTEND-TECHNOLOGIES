<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let  month = prompt("Enter the month (1-12):");
        switch(month) {
            case '3' || '4' || '5' :
                document.writeln("Summer");
                break;
            case '11' || '12' || '1' || '2':
                document.writeln("Winter");
                break;
            case '6' || '7' || '8' || '9':
                document.writeln("Rainy");
                break;        
        }
    </script>
</body>
</html>
