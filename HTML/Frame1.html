<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFRAME</title>
</head>
<body>
    <iframe src="https://www.flipkart.com" scrolling="yes" height="300px" width="300px"></iframe>
    <br>
    <br>

    <iframe srcdoc="<a href='https://www.flipkart.com' scrolling='yes' target='_blank'>Flipkart</a>" width="300px" height="300px"></iframe><br><br>


    <iframe 
    srcdoc="
    <a href='https://www.flipkart.com' target='iframe2'>Flipkart</a>"
    scrolling="yes" height="300px" width="300px" ></iframe>

    <iframe src="https://www.flipkart.com" 
    target="iframe2" scrolling="yes" height="300px" width="300px"></iframe>
</body>
</html>
