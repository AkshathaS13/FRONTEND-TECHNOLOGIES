<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Format</title>
</head>
<body>
    <h2>Table Information</h2>
    <!-- Table for displaying player information -->
    <table border style="width: 590px;">
        <caption style="text-align: right;" >IPL Players INFO</caption>
        <caption style="caption-side: bottom;">IPL Players INFO</caption>
        <!-- first row -->
        <tr>
            <th>Sl/No</th>
            <th>Name</th>
            <th>Team</th>
        </tr>
        <!-- second row -->
        <tr>
            <td>1</td>
            <td>Virat Kohli</td>
            <td>RCB</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Dhoni</td>
            <td>CSK</td>
        </tr>

        <!-- third row -->

        <tr>
            <td>3</td>
            <td>Steve Johnson</td>
            <td>MI</td>
        </tr>
    </table>
</body>
</html>
