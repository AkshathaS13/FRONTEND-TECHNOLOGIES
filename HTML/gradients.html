<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients</title>
    <style>
        #lg {
            width: 200px;
            height: 150px;
            background: linear-gradient(45deg, rgb(231, 100, 231), rgb(123, 234, 234));
        }

        #rg {
            width: 350px;
            height: 200px;
            background: radial-gradient(circle, rgb(9, 9, 159), rgb(25, 25, 235), rgb(84, 84, 236), rgb(159, 159, 243));
        }
    </style>
</head>
<body>
    <h4>Linear Gradient</h4>
    <div id="lg">
        linear Gradient
    </div>

    <h4>Radial Gradient</h4>
    <div id="rg">
        radial Gradient
    </div>
</body>
</html>
