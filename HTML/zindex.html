<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z - index</title>
    <style>

        .container {
            position: relative;
        }

        .black-box {
            position: absolute;
            z-index: 1;
            background-color: black;
            border: 2px solid white;
            height: 500px;
            width: 500px;
            top: 50px;
            left: 50px;
        }
        .white-box {
            position: relative;
            z-index: 2;
            background-color: white;
            border: 2px solid black;
            height: 250px;
            width: 350px;
        }

        .green-box {
            position: absolute;
            z-index: 3;
            background-color:green;
            border: 2px solid lightpink;
            height: 400px;
            width: 450px;
            top: 100px;
            left: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="black-box"></div>
        <div class="white-box"></div>
        <div class="green-box"></div>
    </div>
    
</body>
</html>
