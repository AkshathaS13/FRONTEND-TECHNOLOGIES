<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h2>User Form</h2>
    <hr>
    <form>
        <!--Pattern validation-->
        <label for="username">Name:</label>
        <input type="text" id="username" name="username" pattern="^[A-Z]{1}[a-z]{2,10}$"
        title="Enter only Alphabets" placeholder="Anusha.."><br><br>
        <Label for="phone">Phone Number:</Label>
        <input type="tel" id="phone" name="phone" pattern="^+91[6-9]{1}\d{2}-\d{3}-\d{4}$" title="Enter 10 digits numbers only"><br><br>
        <label for="pwd">Password:</label>
        <!--.{8,}-->
        <!--"^[A-Za-z\d@#$%^&*]{8,}$"-->
        <!--"^(?=.*[a-z])([?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8,}$"-->
        <input type="password" id="pwd" name="pwd" pattern="^(?=(.*\d){2,})([?=(.*[A-Z]){2,})(?=.*@#$%^&])[A-Za-z\d*@#$%^&]{12,60}$" title="Atleast 12 Character"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" pattern="^[A-Za-z\d\._\-]+@[A-Za-z\d]+\.[A-Za-z]{2,}$">
        <button type="submit">Submit</button>
        <button type="cancel">Cancel</button><br><br>
    </form>
    
</body>
</html>
