<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Tag</title>
</head>
<body>
    <h1 style="text-align: center; color: blueviolet;">About Div Tag</h1>
    <!-- Block level Element -->
    <div>Hello</div>
    <div>Hi</div>
    <!-- Inline level Element -->
     <span>Hello.... EVERYONE</span>
     <span>Hi....</span>


     <p>Hello, this is a <span style="color : blue;">paragraph</span></p>
</body>
</html>
